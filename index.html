<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f6f6f6;
    font-family:'Inter',sans-serif;
    color:#444;
}

/* main card */

.container{
    text-align:center;
    max-width:500px;
    padding:40px;
}

/* title */

h1{
    font-family:'Playfair Display',serif;
    font-size:42px;
    font-weight:400;
    margin-bottom:20px;
    color:#333;
}

/* text */

p{
    font-size:16px;
    line-height:1.8;
    color:#555;
}

/* photo */

img{
    width:220px;
    border-radius:14px;
    margin:30px 0;
}

/* button */

button{
    margin-top:25px;
    padding:10px 22px;
    font-size:14px;
    border:1px solid #ccc;
    background:transparent;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#eee;
}

/* hidden message */

.hidden{
    display:none;
    margin-top:25px;
    opacity:0;
    transition:opacity 1.5s;
}

.show{
    display:block;
    opacity:1;
}

</style>

<script>

function showMessage(){
    const msg=document.getElementById("secret");
    msg.classList.add("show");
}

</script>

</head>

<body>

<div class="container">

<h1>happy birthday</h1>

<img src="yihihi.jpeg">

<p>
to the person who brings calm into my life,
thank you for being my safe place.
</p>

<button onclick="showMessage()">a small message</button>

<p id="secret" class="hidden">
i’m grateful for you in ways words can't fully hold.  
happy birthday ♡
</p>

</div>

<!-- background music -->

<audio autoplay loop>
<source src="hinggatuabersama.mp3" type="audio/mpeg">
</audio>

</body>
</html>
