<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background:black;
    color:white;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

/* main card */

.container{
    text-align:center;
    max-width:500px;
    padding:50px 40px;
}

/* title */

h1{
    font-family:'Great Vibes',cursive;
    font-size:55px;
    margin-bottom:10px;
    letter-spacing:2px;
}

/* text */

p{
    font-size:16px;
    line-height:1.8;
    color:#ddd;
}

/* image */

img{
    width:220px;
    border-radius:14px;
    margin:30px 0;
    filter:grayscale(100%);
}

/* button */

button{
    margin-top:30px;
    padding:12px 28px;
    font-size:15px;
    border:1px solid white;
    background:transparent;
    color:white;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    color:black;
}

/* popup wish */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:0.5s;
}

.popup-content{
    background:white;
    color:black;
    padding:40px;
    border-radius:18px;
    max-width:400px;
    text-align:center;
    font-family:'Great Vibes',cursive;
    font-size:26px;
}

.popup.show{
    visibility:visible;
    opacity:1;
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:-20px;
    color:white;
    font-size:18px;
    animation:floatUp 7s linear infinite;
    opacity:0.7;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}

</style>

<script>

function openWish(){
    document.getElementById("popup").classList.add("show");
}

function closeWish(){
    document.getElementById("popup").classList.remove("show");
}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="♡";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*15+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

},600);

</script>

</head>

<body>

<div class="container">

<h1>happy birthday</h1>

<img src="yihihi.jpeg">

<p>
to the one who brings calm into my life,
thank you for being my safe place.
</p>

<button onclick="openWish()">open my heart</button>

</div>


<!-- popup wish -->

<div class="popup" id="popup" onclick="closeWish()">

<div class="popup-content">
happy birthday my love ♡ <br><br>
i’m grateful for you in ways words can’t explain.  
thank you for being the calm in my chaos.  
i hope today reminds you how loved you are.
</div>

</div>


<!-- background music -->

<audio autoplay loop>
<source src="hinggatuabersama.mp3" type="audio/mpeg">
</audio>

</body>
</html>
