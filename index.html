<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background:black;
    color:white;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

/* main card */

.container{
    text-align:center;
    max-width:700px;
    padding:50px 30px;
}

/* title */

h1{
    font-family:'Great Vibes',cursive;
    font-size:60px;
    margin-bottom:10px;
    letter-spacing:2px;
}

/* text */

p{
    font-size:17px;
    line-height:1.8;
    color:#ddd;
}

/* responsive image */

img{
    width:100%;
    max-width:480px;
    height:auto;
    border-radius:18px;
    margin:35px 0;
    filter:grayscale(100%);
    box-shadow:0 12px 40px rgba(255,255,255,0.15);
    transition:0.4s;
}

img:hover{
    transform:scale(1.03);
}

/* buttons */

button{
    margin-top:15px;
    padding:12px 28px;
    font-size:15px;
    border:1px solid white;
    background:transparent;
    color:white;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:white;
    color:black;
}

/* popup */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:0.5s;
}

.popup-content{
    background:white;
    color:black;
    padding:45px;
    border-radius:18px;
    max-width:420px;
    text-align:center;
    font-family:'Great Vibes',cursive;
    font-size:28px;
}

.popup.show{
    visibility:visible;
    opacity:1;
}

/* video popup */

.video-content{
    background:black;
    padding:20px;
    border-radius:18px;
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:-20px;
    color:white;
    font-size:18px;
    animation:floatUp 7s linear infinite;
    opacity:0.7;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:0;
    }
    30%{
        opacity:1;
    }
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* mobile */

@media (max-width:600px){

h1{
    font-size:45px;
}

.container{
    padding:40px 20px;
}

img{
    max-width:90%;
}

}

</style>

<script>

function openWish(){
    document.getElementById("popup").classList.add("show");
}

function closeWish(){
    document.getElementById("popup").classList.remove("show");
}

/* music */

function playMusic(){
    document.getElementById("music").play();
}

function pauseMusic(){
    document.getElementById("music").pause();
}

/* video */

function openVideo(){
    document.getElementById("videoPopup").classList.add("show");
    document.getElementById("video").play();
}

function closeVideo(){
    document.getElementById("videoPopup").classList.remove("show");
    document.getElementById("video").pause();
}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="♡";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*18+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

},600);

</script>

</head>

<body>

<div class="container">

<h1>happy birthday</h1>

<img src="us.jpeg">

<p>
to the one who brings calm into my life,
thank you for being my safe place.
</p>

<button onclick="openWish()">open my heart</button>
<br>

<button onclick="playMusic()">play our song ♡</button>
<button onclick="pauseMusic()">pause music</button>
<br>

<button onclick="openVideo()">play our video ♡</button>

</div>

<!-- wish popup -->

<div class="popup" id="popup" onclick="closeWish()">

<div class="popup-content">
happy birthday my love ♡ <br><br>
i’m grateful for you in ways words can’t explain.  
thank you for being the calm in my chaos.  
i hope today reminds you how loved you are.
</div>

</div>

<!-- video popup -->

<div class="popup" id="videoPopup" onclick="closeVideo()">

<div class="video-content">

<video id="video" width="400" controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>

<!-- music -->

<audio id="music" loop>
<source src="hinggatuabersama.mp3" type="audio/mpeg">
</audio>

</body>
</html>
