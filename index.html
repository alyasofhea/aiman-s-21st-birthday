<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>for you</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* Animated gradient background */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter',sans-serif;
    background: linear-gradient(135deg, #ffe6e6, #fff0f5);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    color:#444;
    overflow:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Main card */
.container{
    text-align:center;
    max-width:500px;
    padding:50px 30px;
    background: rgba(255,255,255,0.6);
    border-radius:25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    backdrop-filter: blur(12px);
    position: relative;
    animation: fadeIn 2s ease forwards;
    opacity:0;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* Title */
h1{
    font-family:'Playfair Display',serif;
    font-size:46px;
    font-weight:400;
    margin-bottom:20px;
    color:#d64b8a;
    animation: bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform: translateY(0);}
    50%{transform: translateY(-10px);}
}

/* Text */
p{
    font-size:16px;
    line-height:1.8;
    color:#555;
}

/* Image */
img{
    width:220px;
    border-radius:16px;
    margin:30px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition: transform 0.5s;
}

img:hover{
    transform: scale(1.05) rotate(-3deg);
}

/* Buttons */
button{
    margin:15px 5px;
    padding:12px 25px;
    font-size:14px;
    border:1px solid #d64b8a;
    background:transparent;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
    color:#d64b8a;
    font-weight:500;
}

button:hover{
    background:#ffd6e0;
    transform: scale(1.1);
}

/* Hidden message */
.hidden{
    display:none;
    margin-top:25px;
    opacity:0;
    transition: opacity 2s ease-in-out;
}

.show{
    display:block;
    opacity:1;
}

/* Floating hearts */
.heart{
    position:absolute;
    color:#ff4b99;
    font-size:18px;
    animation: float 6s linear infinite;
    pointer-events:none;
    opacity:0.8;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0.5); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh) scale(1); opacity:0;}
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background: #ff4b99;
    opacity:0.8;
    pointer-events:none;
    animation: confettiFall 3s linear forwards;
    border-radius:50%;
}

@keyframes confettiFall{
    0%{transform: translateY(0) rotate(0deg);}
    100%{transform: translateY(100vh) rotate(360deg);}
}

</style>

<script>
let audioPlaying = false;
let audio;

window.onload = ()=>{
    audio = document.getElementById("bgMusic");
};

// Show secret message with confetti
function showMessage(){
    const msg=document.getElementById("secret");
    msg.classList.add("show");

    // Confetti effect
    for(let i=0; i<50; i++){
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random()*100 + "vw";
        confetti.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
        document.body.appendChild(confetti);
        setTimeout(()=>confetti.remove(), 3000);
    }
}

// Play/Pause background music
function toggleMusic(){
    if(audioPlaying){
        audio.pause();
        audioPlaying=false;
        document.getElementById("musicBtn").innerText="Play Music 🎵";
    } else {
        audio.play();
        audioPlaying=true;
        document.getElementById("musicBtn").innerText="Pause Music 🎵";
    }
}

// Floating hearts effect
setInterval(function(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 15) + "px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(), 6000);
}, 700);
</script>

</head>

<body>

<div class="container">

<h1>happy birthday ♡</h1>

<img src="yihihi.jpeg" alt="Happy Birthday">

<p>
to the one who fills my life with warmth and calm,<br>
thank you for being my safe place.
</p>

<button onclick="showMessage()">Open a Secret Message</button>
<button id="musicBtn" onclick="toggleMusic()">Pause Music 🎵</button>

<p id="secret" class="hidden">
i’m grateful for you in ways words can't fully hold.<br>
happy birthday my love 🎂💖
</p>

</div>

<!-- background music -->
<audio id="bgMusic" loop>
<source src="hinggatuabersama.mp3" type="audio/mpeg">
</audio>

</body>
</html>
